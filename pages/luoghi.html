<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Luoghi</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px;
}

.title {
  font-size: 20px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* BIG + BUTTON */
.add-btn {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
  vertical-align: middle;
}

tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

/* FILTER ROW */
.filter {
  width: 100%;
  font-size: 12px;
  margin-top: 4px;
}

/* SORT BUTTON */
.sort-btn {
  float: right;
  font-size: 14px;
  cursor: pointer;
  opacity: 0.6;
  padding: 2px 6px;
  border-radius: 4px;
}

.sort-btn:hover {
  background: #e5e7eb;
  opacity: 1;
}

/* MODAL */
#modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
}

#modalContent {
  background: white;
  padding: 18px;
  width: 420px;
  border-radius: 10px;
  position: relative;
}

.closeX {
  position: absolute;
  right: 10px;
  top: 8px;
  cursor: pointer;
  font-weight: bold;
}

input, select, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 6px;
}

/* colonne strette */
.col-lat, .col-lng {
  width: 90px;
}

.col-note {
  width: 140px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">
    Luoghi
    <button class="add-btn" onclick="openModal()">+</button>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th>ID</th>

      <th>
        Comune
        <input class="filter" oninput="setFilter('comune', this.value)">
        <span class="sort-btn" onclick="sort('comune')">-</span>
      </th>

      <th>
        Location
        <input class="filter" oninput="setFilter('location', this.value)">
        <span class="sort-btn" onclick="sort('location')">-</span>
      </th>

      <th class="col-lat">
        Lat
        <input class="filter" oninput="setFilter('lat', this.value)">
        <span class="sort-btn" onclick="sort('lat')">-</span>
      </th>

      <th class="col-lng">
        Lng
        <input class="filter" oninput="setFilter('lng', this.value)">
        <span class="sort-btn" onclick="sort('lng')">-</span>
      </th>

      <th>
        Note
        <input class="filter" oninput="setFilter('note', this.value)">
        <span class="sort-btn">-</span>
      </th>

      <th>
        Capacità
        <span class="sort-btn" onclick="sort('cap')">-</span>
      </th>

    </tr>
  </thead>

  <tbody id="tbody"></tbody>
</table>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">

    <div class="closeX" onclick="closeModal()">✕</div>

    <input type="hidden" id="id_luogo">

    <label>Comune</label>
    <select id="lu_comune"></select>

    <label>Location</label>
    <input id="lu_location">

    <label>Lat</label>
    <input id="lu_lat">

    <label>Lng</label>
    <input id="lu_lng">

    <label>Descrizione</label>
    <textarea id="lu_descrizione"></textarea>

    <label>Note</label>
    <textarea id="lu_note"></textarea>

    <label>Capacità</label>
    <input id="lu_capacita_massima">

  </div>
</div>

<script type="module">
import { supabase } from '../supabase.js';

let data = [];
let comuni = [];

let state = {
  sort: null,
  dir: 'asc',
  filters: {},
  dirty: false,
  editing: null
};

// ---------------- COMUNI ----------------
async function loadComuni() {
  const res = await supabase.from('comuni').select('*');
  comuni = res.data;

  const sel = document.getElementById("lu_comune");
  sel.innerHTML = `<option value="">--</option>`;

  comuni.forEach(c => {
    sel.innerHTML += `<option value="${c.id_comune}">${c.co_descrizione}</option>`;
  });
}

// ---------------- LOAD ----------------
async function load() {
  const res = await supabase.from('luoghi').select('*');
  data = res.data;
  render();
}

// ---------------- RENDER ----------------
function render() {

  let filtered = [...data];

  Object.keys(state.filters).forEach(k => {
    const v = state.filters[k]?.toLowerCase();

    if (!v) return;

    filtered = filtered.filter(r => {

      if (k === 'comune') {
        const c = comuni.find(x => x.id_comune === r.lu_comune);
        return (c?.co_descrizione || '').toLowerCase().includes(v);
      }

      if (k === 'location')
        return (r.lu_location || '').toLowerCase().includes(v);

      if (k === 'note')
        return (r.lu_note || '').toLowerCase().includes(v);

      if (k === 'lat')
        return (r.lu_lat || '').toString().startsWith(v);

      if (k === 'lng')
        return (r.lu_lng || '').toString().startsWith(v);

      return true;
    });
  });

  if (state.sort) {
    filtered.sort((a,b) => {

      let va = a['lu_' + state.sort];
      let vb = b['lu_' + state.sort];

      if (state.dir === 'asc') return va > vb ? 1 : -1;
      return va < vb ? 1 : -1;
    });
  }

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  filtered.forEach(r => {

    const c = comuni.find(x => x.id_comune === r.lu_comune);

    const tr = document.createElement("tr");
    tr.onclick = () => openModal(r);

    tr.innerHTML = `
      <td>${r.id_luogo}</td>
      <td>${c ? c.co_descrizione : ''}</td>
      <td>${r.lu_location || ''}</td>
      <td class="col-lat">${r.lu_lat}</td>
      <td class="col-lng">${r.lu_lng}</td>
      <td>${r.lu_note || ''}</td>
      <td>${r.lu_capacita_massima || ''}</td>
    `;

    tbody.appendChild(tr);
  });
}

// ---------------- FILTER ----------------
window.setFilter = (k,v) => {
  state.filters[k] = v;
  render();
};

// ---------------- SORT ----------------
window.sort = (field) => {

  if (state.sort !== field) {
    state.sort = field;
    state.dir = 'asc';
  } else {
    state.dir = state.dir === 'asc' ? 'desc' : 'asc';
  }

  render();
};

// ---------------- MODAL ----------------
window.openModal = (row=null) => {

  state.dirty = false;
  document.getElementById("modal").style.display = "flex";

  if (!row) {
    document.getElementById("id_luogo").value = "";
    document.getElementById("lu_location").value = "";
    document.getElementById("lu_lat").value = "";
    document.getElementById("lu_lng").value = "";
    document.getElementById("lu_descrizione").value = "";
    document.getElementById("lu_note").value = "";
    document.getElementById("lu_capacita_massima").value = "";
    document.getElementById("lu_comune").value = "";
    return;
  }

  document.getElementById("id_luogo").value = row.id_luogo;
  document.getElementById("lu_comune").value = row.lu_comune || "";
  document.getElementById("lu_location").value = row.lu_location || "";
  document.getElementById("lu_lat").value = row.lu_lat || "";
  document.getElementById("lu_lng").value = row.lu_lng || "";
  document.getElementById("lu_descrizione").value = row.lu_descrizione || "";
  document.getElementById("lu_note").value = row.lu_note || "";
  document.getElementById("lu_capacita_massima").value = row.lu_capacita_massima || "";
};

window.closeModal = (e) => {
  if (e && e.target.id !== 'modal') return;
  document.getElementById("modal").style.display = "none";
};

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

await loadComuni();
await load();

</script>

</body>
</html>
