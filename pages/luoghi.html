<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Luoghi Admin</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

#modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
}

#modalContent {
  background: white;
  padding: 20px;
  width: 400px;
  border-radius: 10px;
}

input, select, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 6px;
}
</style>

</head>

<body>

<h2>Luoghi</h2>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Comune</th>
      <th>Location</th>
      <th>Lat</th>
      <th>Lng</th>
      <th>Capacità</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">

    <input type="hidden" id="id_luogo">

    <label>Comune</label>
    <select id="lu_comune"></select>

    <label>Location</label>
    <input id="lu_location">

    <label>Lat</label>
    <input id="lu_lat">

    <label>Lng</label>
    <input id="lu_lng">

    <label>Descrizione</label>
    <textarea id="lu_descrizione"></textarea>

    <label>Note</label>
    <textarea id="lu_note"></textarea>

    <label>Capacità</label>
    <input id="lu_capacita_massima">

    <button onclick="save()">Salva</button>
    <button onclick="closeModal()">Chiudi</button>

  </div>
</div>

<script type="module">
import { supabase } from '../supabase.js';

let comuni = [];
let luoghi = [];

async function loadComuni() {
  const { data } = await supabase
    .from('comuni')
    .select('id_comune, co_descrizione');

  comuni = data;

  const sel = document.getElementById("lu_comune");
  sel.innerHTML = `<option value="">--</option>`;

  comuni.forEach(c => {
    sel.innerHTML += `<option value="${c.id_comune}">${c.co_descrizione}</option>`;
  });
}

async function load() {
  const { data } = await supabase
    .from('luoghi')
    .select('*')
    .order('id_luogo', { ascending: false });

  luoghi = data;

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach(r => {

    const c = comuni.find(x => x.id_comune === r.lu_comune);

    const tr = document.createElement("tr");

    tr.onclick = () => openModal(r);

    tr.innerHTML = `
      <td>${r.id_luogo}</td>
      <td>${c ? c.co_descrizione : ''}</td>
      <td>${r.lu_location ?? ''}</td>
      <td>${r.lu_lat}</td>
      <td>${r.lu_lng}</td>
      <td>${r.lu_capacita_massima ?? ''}</td>
    `;

    tbody.appendChild(tr);
  });
}

window.openModal = function(row) {
  document.getElementById("modal").style.display = "flex";

  document.getElementById("id_luogo").value = row.id_luogo;
  document.getElementById("lu_comune").value = row.lu_comune || "";
  document.getElementById("lu_location").value = row.lu_location || "";
  document.getElementById("lu_lat").value = row.lu_lat || "";
  document.getElementById("lu_lng").value = row.lu_lng || "";
  document.getElementById("lu_descrizione").value = row.lu_descrizione || "";
  document.getElementById("lu_note").value = row.lu_note || "";
  document.getElementById("lu_capacita_massima").value = row.lu_capacita_massima || "";
}

window.closeModal = function() {
  document.getElementById("modal").style.display = "none";
}

window.save = async function() {

  const id = document.getElementById("id_luogo").value;

  const payload = {
    lu_comune: document.getElementById("lu_comune").value || null,
    lu_location: document.getElementById("lu_location").value,
    lu_lat: parseFloat(document.getElementById("lu_lat").value),
    lu_lng: parseFloat(document.getElementById("lu_lng").value),
    lu_descrizione: document.getElementById("lu_descrizione").value,
    lu_note: document.getElementById("lu_note").value,
    lu_capacita_massima: parseInt(document.getElementById("lu_capacita_massima").value)
  };

  await supabase
    .from('luoghi')
    .update(payload)
    .eq('id_luogo', id);

  closeModal();
  load();
}

await loadComuni();
await load();

</script>

</body>
</html>
